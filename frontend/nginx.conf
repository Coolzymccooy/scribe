# nginx.conf — template for the ScribeAI frontend container.
#
# envsubst is called with ONLY '${BACKEND_URL}' so all other nginx
# $variables (like $host, $uri, $request_uri) are left untouched.
# See Dockerfile CMD for how this is generated.
#
# Required env var at runtime:
#   BACKEND_URL=https://api-scribe.tiwaton.co.uk

server {
    listen 80;
    server_name _;

    # Docker's embedded DNS resolver — required when proxy_pass uses a
    # variable so nginx resolves the upstream hostname at request time.
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # ---- API proxy ----
    # $backend is set from ${BACKEND_URL} at container start (envsubst).
    # Using a variable forces nginx to use the resolver above instead of
    # trying to resolve the hostname at startup (which caused the crash loop).
    location /api/ {
        set $backend "${BACKEND_URL}";

        proxy_pass        $backend$request_uri;
        proxy_http_version 1.1;

        proxy_ssl_verify      off;
        proxy_ssl_server_name on;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Support large audio uploads (up to 200 MB)
        client_max_body_size 200m;

        # Long timeouts for transcription/analysis requests
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }

    # ---- SPA fallback ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Security headers ----
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ---- Static asset caching ----
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
