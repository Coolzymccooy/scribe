# nginx.conf — template for the ScribeAI frontend container.
#
# The official nginx Docker image automatically runs envsubst on files
# placed in /etc/nginx/templates/*.template before starting nginx.
# ${BACKEND_URL} is substituted at container start-up with the runtime
# env var; all other nginx $variables are escaped as $$ in this file so
# they survive envsubst unchanged.
#
# Required env var at runtime:
#   BACKEND_URL=https://api-scribe.tiwaton.co.uk

server {
    listen 80;
    server_name _;

    # Use Docker's embedded DNS so proxy_pass hostnames resolve at
    # request time. Without this, nginx tries to resolve the upstream
    # hostname at startup and exits if DNS is not yet ready.
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # ---- API proxy ----
    # Forwards /api/* to the backend service so the browser never makes
    # a cross-origin request. This replaces the Vercel vercel.json rewrite.
    location /api/ {
        # Store the backend URL in a variable so nginx uses the resolver
        # above for runtime DNS lookups instead of resolving at startup.
        set $$backend "${BACKEND_URL}";

        proxy_pass $$backend$$request_uri;
        proxy_http_version 1.1;

        proxy_ssl_verify      off;
        proxy_ssl_server_name on;

        proxy_set_header Host              $$host;
        proxy_set_header X-Real-IP         $$remote_addr;
        proxy_set_header X-Forwarded-For   $$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $$scheme;
        proxy_set_header Connection        "";

        # Support large audio uploads (up to 200 MB)
        client_max_body_size 200m;

        # Long timeouts for transcription/analysis requests
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }

    # ---- SPA fallback ----
    # Serve index.html for all non-file routes so React Router works.
    location / {
        try_files $$uri $$uri/ /index.html;
    }

    # ---- Security headers ----
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ---- Static asset caching ----
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $$uri =404;
    }
}
