# nginx.conf — serves the ScribeAI React SPA.
#
# API calls are made directly from the browser to the backend
# (VITE_BACKEND_URL baked in at build time). No nginx proxy needed.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- SPA fallback ----
    # All non-file paths serve index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Security headers ----
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ---- Static asset caching ----
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
